name: Bioconductor Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  bioc-check:
    runs-on: ubuntu-latest
    container: bioconductor/bioconductor_docker:devel

    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'

      - name: Install dependencies
        run: |
          Rscript -e 'options(repos = c(CRAN = "https://packagemanager.rstudio.com/all/latest")); install.packages(c("rcmdcheck","BiocManager"))'
          Rscript -e 'if (!requireNamespace("BiocCheck", quietly=TRUE)) BiocManager::install("BiocCheck")'

      - name: Run R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          error-on: '"warning"'

      - name: Run BiocCheck
        run: |
          BiocCheck::BiocCheck(dir('check', 'AlphaGenomeR.*.tar.gz', full.names = TRUE))
        shell: Rscript {0}
