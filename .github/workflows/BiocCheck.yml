name: Bioconductor Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  bioc-check:
    runs-on: ubuntu-latest
    container: bioconductor/bioconductor_docker:devel

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          Rscript -e 'options(repos = c(CRAN = "https://packagemanager.rstudio.com/all/latest"))'
          Rscript -e 'install.packages(c("devtools", "remotes", "rcmdcheck", "BiocManager"), quiet = TRUE)'
          Rscript -e 'if (!requireNamespace("BiocCheck", quietly=TRUE)) BiocManager::install("BiocCheck")'
          Rscript -e 'remotes::install_deps(dependencies = TRUE)'

      - name: Run devtools test and check
        run: |
          devtools::test()
          devtools::check(error_on = "warning")
        shell: Rscript {0}

      - name: Run R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          error-on: '"warning"'

      - name: Run BiocCheck
        run: |
          BiocCheck::BiocCheck(dir('check', 'AlphaGenomeR.*.tar.gz', full.names = TRUE))
        shell: Rscript {0}
