<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="16" />

  <!-- Flow labels -->
  <text x="400" y="40" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="800" fill="#fff" letter-spacing="2">BDB-GENOMICS ARCHITECTURE PATTERN</text>

  <!-- Logic Layers -->
  <g transform="translate(50, 80)">
    <!-- Configuration -->
    <rect x="0" y="0" width="200" height="240" rx="12" fill="url(#grad1)" stroke="#6366f1" stroke-width="2" filter="url(#shadow)" />
    <text x="100" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#fff">1. CONFIGURATION</text>
    <line x1="20" y1="50" x2="180" y2="50" stroke="#6366f1" stroke-width="1" />
    <text x="20" y="80" font-family="Inter, sans-serif" font-size="11" fill="#cbd5e1">- Global Metadata</text>
    <text x="20" y="110" font-family="Inter, sans-serif" font-size="11" fill="#cbd5e1">- Assay Parameters</text>
    <text x="20" y="140" font-family="Inter, sans-serif" font-size="11" fill="#cbd5e1">- Tool-Specific Env</text>
    <text x="20" y="170" font-family="Inter, sans-serif" font-size="11" fill="#cbd5e1">- Resource Limits</text>
  </g>

  <path d="M250 200 L300 200" stroke="#475569" stroke-width="3" stroke-dasharray="5 5" />

  <g transform="translate(300, 80)">
    <!-- Orchestration -->
    <rect x="0" y="0" width="200" height="240" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2" filter="url(#shadow)" />
    <text x="100" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#fff">2. ORCHESTRATION</text>
    <line x1="20" y1="50" x2="180" y2="50" stroke="#10b981" stroke-width="1" />
    <text x="100" y="90" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#10b981">SNAKEMAKE CORE</text>
    <circle cx="100" cy="160" r="40" fill="none" stroke="#22d3ee" stroke-width="3" stroke-dasharray="10 5">
        <animateTransform attributeName="transform" type="rotate" from="0 100 160" to="360 100 160" dur="10s" repeatCount="indefinite" />
    </circle>
  </g>

  <path d="M500 200 L550 200" stroke="#475569" stroke-width="3" stroke-dasharray="5 5" />

  <g transform="translate(550, 80)">
    <!-- Governance -->
    <rect x="0" y="0" width="200" height="240" rx="12" fill="#1e293b" stroke="#f43f5e" stroke-width="2" filter="url(#shadow)" />
    <text x="100" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#fff">3. GOVERNANCE</text>
    <line x1="20" y1="50" x2="180" y2="50" stroke="#f43f5e" stroke-width="1" />
    <text x="20" y="80" font-family="Inter, sans-serif" font-size="11" fill="#cbd5e1">- Automated QC Gates</text>
    <text x="20" y="110" font-family="Inter, sans-serif" font-size="11" fill="#cbd5e1">- Standardized Benchmarks</text>
    <text x="20" y="140" font-family="Inter, sans-serif" font-size="11" fill="#cbd5e1">- Unified Error Handling</text>
    <text x="20" y="170" font-family="Inter, sans-serif" font-size="11" fill="#cbd5e1">- Reproducible Reports</text>
  </g>
</svg>
